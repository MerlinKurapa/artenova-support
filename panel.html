<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
  margin:0;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
}

.logo{
  font-size:20px;
  font-weight:600;
}

.actions button{
  margin-left:10px;
  padding:8px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.home{background:#3b82f6;color:white;}
.logout{background:#ef4444;color:white;}

/* CONTAINER */
.container{
  max-width:900px;
  margin:40px auto;
}

/* TITLE */
h2{
  text-align:center;
  margin-bottom:30px;
}

/* CARD */
.ticket{
  background: rgba(30,41,59,0.7);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:20px;
  margin:15px;
  box-shadow:0 0 20px rgba(59,130,246,0.2);
  transition:0.3s;
}

.ticket:hover{
  transform:scale(1.02);
  box-shadow:0 0 30px rgba(59,130,246,0.6);
}

.ticket p{
  margin:6px 0;
}

/* STATUS */
.status-open{
  color:#22c55e;
}

.status-closed{
  color:#ef4444;
}

/* EMPTY */
.empty{
  text-align:center;
  color:#64748b;
  margin-top:40px;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">📬 Panel</div>

  <div class="actions">
    <button class="home" onclick="goHome()">Ana Sayfa</button>
    <button class="logout" onclick="logout()">Çıkış</button>
  </div>
</div>

<div class="container">

<h2>Ticketlerim</h2>

<div id="tickets"></div>

<div id="empty" class="empty" style="display:none;">
Hiç ticketın yok 😢
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEgE2zQ9zz0Ie_yN39P2uJl8wrZZmymdU",
  authDomain: "ticker-489ad.firebaseapp.com",
  projectId: "ticker-489ad",
  storageBucket: "ticker-489ad.firebasestorage.app",
  messagingSenderId: "649615430475",
  appId: "1:649615430475:web:0fc027484950c1090b8ece",
  measurementId: "G-M82RWCCG71"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, async (user)=>{

  if(!user){
    location.href="login.html";
    return;
  }

  const snap = await getDocs(collection(db,"tickets"));

  let count = 0;

  snap.forEach(doc=>{
    const data = doc.data();

    if(data.userEmail === user.email){
      count++;

      document.getElementById("tickets").innerHTML += `
        <div class="ticket">
          <p><b>Mesaj:</b> ${data.message}</p>
          <p><b>Durum:</b> 
            <span class="${data.status === "closed" ? "status-closed" : "status-open"}">
              ${data.status}
            </span>
          </p>
          <p><b>Cevap:</b> ${data.reply || "Henüz yok"}</p>
        </div>
      `;
    }
  });

  if(count === 0){
    document.getElementById("empty").style.display="block";
  }

});

// NAV
window.goHome = ()=>{
  location.href="index.html";
}

window.logout = ()=>{
  signOut(auth);
  location.href="login.html";
}
</script>

</body>
</html>
