<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  margin:0;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* CENTER */
.wrapper{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CARD */
.card{
  background: rgba(30,41,59,0.6);
  backdrop-filter: blur(12px);
  padding:40px;
  border-radius:25px;
  box-shadow:0 0 30px rgba(59,130,246,0.2);
  text-align:center;
  width:400px;
  transition:0.3s;
}

.card:hover{
  box-shadow:0 0 40px rgba(59,130,246,0.6);
}

/* TITLE */
h2{
  margin-bottom:20px;
}

/* INPUT */
input, textarea{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:18px;
  border:1px solid rgba(59,130,246,0.3);
  background: rgba(15,23,42,0.7);
  color:white;
  outline:none;
  transition:0.3s;
}

input:focus, textarea:focus{
  border:1px solid #3b82f6;
  box-shadow:0 0 15px #3b82f6;
  transform:scale(1.02);
}

textarea{
  min-height:140px;
  resize:none;
}

/* BUTTON */
button{
  margin-top:15px;
  padding:12px 30px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
  cursor:pointer;
  transition:0.3s;
  font-size:15px;
}

button:hover{
  transform:scale(1.08);
  box-shadow:0 0 25px #22c55e;
}

/* WARNING CARD */
.warning{
  margin-top:20px;
  background: rgba(239,68,68,0.15);
  border:1px solid rgba(239,68,68,0.6);
  padding:15px;
  border-radius:15px;
  color:#f87171;
  box-shadow:0 0 20px rgba(239,68,68,0.4);
}

/* TOP ALERT */
.top-alert{
  position:fixed;
  top:-80px;
  left:50%;
  transform:translateX(-50%);
  background: rgba(239,68,68,0.2);
  border:1px solid red;
  padding:15px;
  border-radius:12px;
  transition:0.4s;
}

.top-alert.show{
  top:20px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:15px;
  color:#64748b;
  border-top:1px solid rgba(255,255,255,0.1);
}
</style>

</head>

<body>

<div id="topAlert" class="top-alert"></div>

<div class="wrapper">

<div class="card">

<h2 id="title">🎫 Ticket Oluştur</h2>

<input id="username" placeholder="Arte Kullanıcı Adın">
<input id="instagram" placeholder="Instagram Kullanıcı Adın">
<textarea id="message" placeholder="Sorununuzu İletin"></textarea>

<button onclick="send()">Gönder</button>

<div class="warning">
⚠️ <b>Not:</b> Bilgileri doğru girmezsen geri dönüş alamazsın!
</div>

</div>

</div>

<div class="footer">
© 2026 ArteNova Destek Sistemi • Tüm hakları saklıdır
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEgE2zQ9zz0Ie_yN39P2uJl8wrZZmymdU",
  authDomain: "ticker-489ad.firebaseapp.com",
  projectId: "ticker-489ad",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser=null;

onAuthStateChanged(auth,(user)=>{
  if(!user){
    location.href="login.html";
  } else {
    currentUser=user;
  }
});

function showAlert(text){
  const el=document.getElementById("topAlert");
  el.innerText=text;
  el.classList.add("show");

  setTimeout(()=>el.classList.remove("show"),2000);
}

window.send = async ()=>{

  const username=document.getElementById("username");
  const instagram=document.getElementById("instagram");
  const message=document.getElementById("message");

  if(!username.value || !instagram.value || !message.value){
    showAlert("⚠️ Tüm alanları doldur!");
    return;
  }

  await addDoc(collection(db,"tickets"),{
    username: username.value,
    instagram: instagram.value,
    message: message.value,
    userEmail: currentUser.email,
    status:"open",
    created:new Date()
  });

  showAlert("✅ Gönderildi!");

  setTimeout(()=>{
    location.href="panel.html";
  },1200);
}
</script>

</body>
</html>
