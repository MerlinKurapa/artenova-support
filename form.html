<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  text-align: center;
}

/* ÜST UYARI */
.top-alert {
  position: fixed;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(239, 68, 68, 0.15);
  border: 1px solid rgba(239, 68, 68, 0.6);
  color: #f87171;
  padding: 15px 25px;
  border-radius: 14px;
  font-size: 14px;
  box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
  transition: 0.4s;
  z-index: 999;
}

.top-alert.show {
  top: 20px;
}

h2 {
  margin-top: 80px;
  font-size: 28px;
  font-weight: 600;
}

input, textarea {
  width: 340px;
  padding: 14px;
  margin: 12px;
  border-radius: 18px;
  border: 1px solid rgba(59,130,246,0.3);
  outline: none;
  background: rgba(15, 23, 42, 0.6);
  color: white;
}

textarea {
  min-height: 160px;
}

.error {
  border: 1px solid #ef4444 !important;
}

button {
  padding: 12px 30px;
  border-radius: 12px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

.warning {
  margin-top: 20px;
  color: #f87171;
}

.success {
  margin-top: 20px;
  color: #4ade80;
  display: none;
}
</style>

</head>

<body>

<div id="topAlert" class="top-alert"></div>

<h2 id="title"></h2>

<input id="username" placeholder="Arte Kullanıcı Adın"><br>
<input id="instagram" placeholder="Instagram Kullanıcı Adın"><br>
<textarea id="message" placeholder="Sorununuzu İletin"></textarea><br>

<button onclick="send()">Gönder</button>

<div class="warning">
⚠️ Bilgileri doğru girmezsen geri dönüş alamazsın!
</div>

<div class="success" id="successMsg">
✅ Gönderildi!
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEgE2zQ9zz0Ie_yN39P2uJl8wrZZmymdU",
  authDomain: "ticker-489ad.firebaseapp.com",
  projectId: "ticker-489ad",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

// 🔒 GİRİŞ KONTROL
onAuthStateChanged(auth, (user)=>{
  if(!user){
    location.href="login.html";
  } else {
    currentUser = user;
  }
});

const urlParams = new URLSearchParams(window.location.search);
const type = urlParams.get("type");

document.getElementById("title").innerText =
  type === "ticket" ? "🎫 Ticket Oluştur" :
  type === "support" ? "🛠️ Destek Talebi" :
  "💡 Öneri Gönder";

function showAlert(text) {
  const alertBox = document.getElementById("topAlert");
  alertBox.innerText = text;
  alertBox.classList.add("show");

  setTimeout(() => {
    alertBox.classList.remove("show");
  }, 2500);
}

window.send = async () => {

  const username = document.getElementById("username");
  const instagram = document.getElementById("instagram");
  const message = document.getElementById("message");

  username.classList.remove("error");
  instagram.classList.remove("error");
  message.classList.remove("error");

  if (!username.value || !instagram.value || !message.value) {

    if (!username.value) username.classList.add("error");
    if (!instagram.value) instagram.classList.add("error");
    if (!message.value) message.classList.add("error");

    showAlert("⚠️ Tüm alanları doldur!");
    return;
  }

  await addDoc(collection(db, "tickets"), {
    username: username.value,
    instagram: instagram.value,
    message: message.value,
    userEmail: currentUser.email, // 🔥 EN ÖNEMLİ KISIM
    type: type,
    status: "open",
    created: new Date()
  });

  document.getElementById("successMsg").style.display = "block";

  showAlert("✅ Gönderildi!");

  setTimeout(()=>{
    location.href="panel.html"; // 🔥 panel yönlendirme
  },1500);
}
</script>

</body>
</html>
