<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kayıt</title>
</head>

<body>

<h2>Kayıt Ol</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Şifre"><br>

<button onclick="register()">Kayıt</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEgE2zQ9zz0Ie_yN39P2uJl8wrZZmymdU",
  authDomain: "ticker-489ad.firebaseapp.com",
  projectId: "ticker-489ad",
  storageBucket: "ticker-489ad.firebasestorage.app",
  messagingSenderId: "649615430475",
  appId: "1:649615430475:web:0fc027484950c1090b8ece",
  measurementId: "G-M82RWCCG71"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  await createUserWithEmailAndPassword(auth, email, pass);

  alert("Kayıt başarılı!");
}
</script>

</body>
</html>
