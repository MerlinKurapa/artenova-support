<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ArteNova Destek Merkezi</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  text-align: center;

  display: flex;
  flex-direction: column;
  min-height: 100vh;
  overflow-x: hidden;
}

/* 🔥 ARKA PLAN IŞIK EFEKTİ */
body::before {
  content: "";
  position: fixed;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(59,130,246,0.2), transparent 70%);
  top: -200px;
  left: -200px;
  filter: blur(100px);
}

/* HEADER */
.header {
  margin-top: 60px;
  animation: fadeDown 1s ease;
}

.header h1 {
  font-size: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
}

/* LOGO */
.logo {
  width: 65px;
  filter: drop-shadow(0 0 15px #3b82f6);
  animation: float 3s infinite ease-in-out;
}

/* ALT YAZI */
.subtitle {
  color: #94a3b8;
  margin-top: 10px;
}

/* KART ALANI */
.container {
  margin-top: 80px;
  flex: 1;
}

/* KART */
.card {
  display: inline-block;
  background: #1e293b;
  padding: 45px;
  margin: 20px;
  border-radius: 18px;
  cursor: pointer;
  transition: 0.3s;
  width: 230px;
  position: relative;
  overflow: hidden;
}

/* IŞIK EFEKTİ */
.card::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(59,130,246,0.4), transparent 60%);
  top: -50%;
  left: -50%;
  opacity: 0;
  transition: 0.5s;
}

.card:hover::before {
  opacity: 1;
}

/* HOVER */
.card:hover {
  transform: scale(1.1);
  background: #334155;
  box-shadow: 0 0 30px rgba(59,130,246,0.6);
}

/* İKON */
.card span {
  font-size: 30px;
}

/* BAŞLIK */
.card h2 {
  margin: 10px 0;
}

/* AÇIKLAMA */
.card p {
  font-size: 14px;
  color: #94a3b8;
}

/* FOOTER */
.footer {
  margin-top: auto;
  padding: 20px;
  color: #64748b;
  font-size: 14px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

/* ANİMASYONLAR */
@keyframes float {
  0% { transform: translateY(0px);}
  50% { transform: translateY(-8px);}
  100% { transform: translateY(0px);}
}

@keyframes fadeDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>

<body>

<div class="header">
  <h1>
    <img src="logo.png" class="logo">
    ArteNova Destek Merkezi
  </h1>

  <div class="subtitle">
    Sorunlarını hızlıca bildir, anında destek al 🚀
  </div>
</div>

<div class="container">

  <div class="card" onclick="openForm('ticket')">
    <span>🎟️</span>
    <h2>Ticket</h2>
    <p>Sistem hatalarını bildir</p>
  </div>

  <div class="card" onclick="openForm('support')">
    <span>🛠️</span>
    <h2>Destek</h2>
    <p>Kurulum ve kullanım yardımı</p>
  </div>

  <div class="card" onclick="openForm('suggestion')">
    <span>💡</span>
    <h2>Öneri</h2>
    <p>Fikirlerini bizimle paylaş</p>
  </div>

</div>

<div class="footer">
  © 2026 ArteNova Destek Sistemi • Tüm hakları saklıdır
</div>

<script>
function openForm(type) {
  window.location.href = "form.html?type=" + type;
}
</script>

</body>
</html>
