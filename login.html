<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Giriş Yap</title>

<style>
body {
  font-family: Poppins, sans-serif;
  background:#020617;
  color:white;
  text-align:center;
  margin-top:100px;
}

input {
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
  width:250px;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>Giriş Yap</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Şifre"><br>

<button onclick="login()">Giriş Yap</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEgE2zQ9zz0Ie_yN39P2uJl8wrZZmymdU",
  authDomain: "ticker-489ad.firebaseapp.com",
  projectId: "ticker-489ad",
  storageBucket: "ticker-489ad.firebasestorage.app",
  messagingSenderId: "649615430475",
  appId: "1:649615430475:web:0fc027484950c1090b8ece",
  measurementId: "G-M82RWCCG71"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Alanlar boş olamaz!");
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Giriş başarılı!");

    // 🔥 admin mi kontrol et
    if(email === "bulureren76@gmail.com"){
      window.location.href = "admin.html";
    } else {
      window.location.href = "index.html";
    }

  } catch(e){
    alert("Hatalı giriş!");
  }

}
</script>

</body>
</html>
