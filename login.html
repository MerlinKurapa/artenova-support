<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Giriş</title>

<style>
body {
  background:#020617;
  color:white;
  text-align:center;
  font-family:Poppins;
}

input {
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:none;
}

button {
  padding:10px 20px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:white;
}
</style>
</head>

<body>

<h2>Giriş Yap</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Şifre"><br>

<button onclick="login()">Giriş</button>

<p>Hesabın yok mu? <a href="register.html">Kayıt ol</a></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEgE2zQ9zz0Ie_yN39P2uJl8wrZZmymdU",
  authDomain: "ticker-489ad.firebaseapp.com",
  projectId: "ticker-489ad",
  storageBucket: "ticker-489ad.firebasestorage.app",
  messagingSenderId: "649615430475",
  appId: "1:649615430475:web:0fc027484950c1090b8ece",
  measurementId: "G-M82RWCCG71"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  await signInWithEmailAndPassword(auth, email, pass);

  window.location.href = "panel.html";
}
</script>

</body>
</html>
