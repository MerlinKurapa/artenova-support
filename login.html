<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Giriş Yap</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#020617,#0f172a);
  font-family:Poppins;
  color:white;
}

/* KART */
.card {
  background: rgba(30,41,59,0.6);
  backdrop-filter: blur(20px);
  padding:40px;
  border-radius:25px;
  width:320px;
  text-align:center;
  border:1px solid rgba(59,130,246,0.4);
  box-shadow:0 0 40px rgba(59,130,246,0.3);
  transition:0.3s;
}

.card:hover {
  box-shadow:0 0 60px rgba(59,130,246,0.6);
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:15px;
  border:none;
  background:#020617;
  color:white;
  outline:none;
  transition:0.3s;
}

input:focus {
  box-shadow:0 0 15px #3b82f6;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:15px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px #3b82f6;
}

/* ALT LINK */
.link {
  margin-top:15px;
  font-size:14px;
  color:#94a3b8;
}

.link a {
  color:#3b82f6;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="card">
  <h2>Giriş Yap</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Şifre">

  <button onclick="login()">Giriş Yap</button>

  <div class="link">
    Hesabın yok mu? <a href="register.html">Kayıt Ol</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEgE2zQ9zz0Ie_yN39P2uJl8wrZZmymdU",
  authDomain: "ticker-489ad.firebaseapp.com",
  projectId: "ticker-489ad",
  storageBucket: "ticker-489ad.firebasestorage.app",
  messagingSenderId: "649615430475",
  appId: "1:649615430475:web:0fc027484950c1090b8ece"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async () => {
  const email = email.value;
  const password = password.value;

  try {
    await signInWithEmailAndPassword(auth,email,password);

    if(email === "bulureren76@gmail.com"){
      location.href = "admin.html";
    } else {
      location.href = "index.html";
    }

  } catch {
    alert("Hatalı giriş!");
  }
}
</script>

</body>
</html>
