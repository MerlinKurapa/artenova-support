<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  align-items:center;
}

.logo{
  font-weight:600;
}

.logout{
  background:#ef4444;
  border:none;
  padding:8px 15px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* STATS */
.stats{
  display:flex;
  gap:20px;
  justify-content:center;
  margin-top:10px;
}

.stat{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  width:150px;
  text-align:center;
  box-shadow:0 0 20px rgba(59,130,246,0.2);
}

/* FILTER */
.filters{
  text-align:center;
  margin:20px;
}

.filters button{
  margin:5px;
  padding:8px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.active{
  background:#3b82f6;
  color:white;
}

/* TICKETS */
.container{
  max-width:900px;
  margin:auto;
}

.ticket{
  background: rgba(30,41,59,0.7);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:20px;
  margin:15px;
  box-shadow:0 0 20px rgba(59,130,246,0.2);
  transition:0.3s;
}

.ticket:hover{
  transform:scale(1.02);
  box-shadow:0 0 30px rgba(59,130,246,0.6);
}

.ticket p{
  margin:6px 0;
}

/* STATUS */
.open{color:#22c55e;}
.closed{color:#ef4444;}

/* INPUT */
input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#020617;
  color:white;
  margin-top:10px;
}

/* BUTTONS */
.replyBtn{
  background:#3b82f6;
}

.closeBtn{
  background:#ef4444;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
  color:white;
}

button:hover{
  transform:scale(1.05);
}
</style>

</head>

<body>

<div class="topbar">
  <div class="logo">🛠️ Admin Dashboard</div>
  <button class="logout" onclick="logout()">Çıkış</button>
</div>

<div class="stats">
  <div class="stat">
    <h3 id="total">0</h3>
    <p>Toplam</p>
  </div>
  <div class="stat">
    <h3 id="open">0</h3>
    <p>Açık</p>
  </div>
  <div class="stat">
    <h3 id="closed">0</h3>
    <p>Kapalı</p>
  </div>
</div>

<div class="filters">
  <button onclick="setFilter('all')" class="active">Tümü</button>
  <button onclick="setFilter('open')">Açık</button>
  <button onclick="setFilter('closed')">Kapalı</button>
</div>

<div class="container" id="tickets"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEgE2zQ9zz0Ie_yN39P2uJl8wrZZmymdU",
  authDomain: "ticker-489ad.firebaseapp.com",
  projectId: "ticker-489ad",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let allTickets = [];
let filter = "all";

// AUTH
onAuthStateChanged(auth, async (user)=>{
  if (!user || user.email !== "bulureren76@gmail.com") {
    location.href = "login.html";
    return;
  }

  const snap = await getDocs(collection(db,"tickets"));

  allTickets = [];

  snap.forEach(d=>{
    allTickets.push({id:d.id, ...d.data()});
  });

  render();
});

// RENDER
function render(){
  let total=0, open=0, closed=0;

  document.getElementById("tickets").innerHTML="";

  allTickets.forEach(t=>{
    total++;
    if(t.status==="open") open++;
    if(t.status==="closed") closed++;

    if(filter !== "all" && t.status !== filter) return;

    document.getElementById("tickets").innerHTML += `
      <div class="ticket">
        <p><b>${t.username}</b> (${t.instagram})</p>
        <p>${t.message}</p>
        <p class="${t.status}">${t.status}</p>
        <p><b>Cevap:</b> ${t.reply || "Yok"}</p>

        <input id="r${t.id}" placeholder="Cevap yaz">

        <button class="replyBtn" onclick="reply('${t.id}')">Cevapla</button>
        <button class="closeBtn" onclick="closeTicket('${t.id}')">Kapat</button>
      </div>
    `;
  });

  document.getElementById("total").innerText=total;
  document.getElementById("open").innerText=open;
  document.getElementById("closed").innerText=closed;
}

// FILTER
window.setFilter = (f)=>{
  filter = f;

  document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");

  render();
}

// REPLY
window.reply = async(id)=>{
  const val = document.getElementById("r"+id).value;

  if(!val) return alert("Boş olamaz");

  await updateDoc(doc(db,"tickets",id),{ reply: val });

  allTickets.find(t=>t.id===id).reply = val;
  render();
}

// CLOSE
window.closeTicket = async(id)=>{
  await updateDoc(doc(db,"tickets",id),{ status:"closed" });

  allTickets.find(t=>t.id===id).status = "closed";
  render();
}

// LOGOUT
window.logout = ()=>{
  signOut(auth);
  location.href="login.html";
}
</script>

</body>
</html>
